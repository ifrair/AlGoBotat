# nginx.conf with JWT verification via njs
# Uses nginx + njs module for JWT validation

load_module modules/ngx_http_js_module.so;

events {
    worker_connections 1024;
}

http {
    # Include MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # JWT verification via njs
    js_import /etc/nginx/njs/jwt.js;
    js_set $jwt_payload    jwt_verify_token;
    js_set $jwt_user_id    jwt_get_user_id;
    js_set $jwt_role       jwt_get_role;
    js_set $admin_valid    validate_admin;

    # Upstream definitions
    upstream auth_service {
        server auth_service:8000;
    }

    upstream user_service {
        server user_service:8000;
    }

    upstream course_service {
        server course_service:8000;
    }

    upstream content_service {
        server content_service:8000;
    }

    upstream submission_service {
        server submission_service:8000;
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'user_id="$jwt_user_id" role="$jwt_role"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name localhost;
        charset utf-8;

        # ============================================================
        # AUTH SERVICE — public routes (no JWT required)
        # ============================================================

        # POST /api/v1/auth/login — login, returns JWT
        location = /api/v1/auth/login {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # ============================================================
        # AUTH SERVICE — protected routes (JWT required)
        # ============================================================

        # GET /api/v1/auth/me — get current user info
        location = /api/v1/auth/me {
            auth_request /_validate_jwt;

            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-ID $jwt_user_id;
            proxy_set_header X-User-Role $jwt_role;
        }

        # POST /api/v1/auth/logout — logout
        location = /api/v1/auth/logout {
            auth_request /_validate_jwt;

            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-ID $jwt_user_id;
            proxy_set_header X-User-Role $jwt_role;
        }

        # ============================================================
        # USER SERVICE — requires JWT
        # ============================================================

        location /api/v1/users/ {
            auth_request /_validate_jwt;

            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-ID $jwt_user_id;
            proxy_set_header X-User-Role $jwt_role;
        }

        # ============================================================
        # COURSE SERVICE — requires JWT
        # ============================================================

        location /api/v1/courses/ {
            auth_request /_validate_jwt;

            proxy_pass http://course_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-ID $jwt_user_id;
            proxy_set_header X-User-Role $jwt_role;
        }

        # ============================================================
        # CONTENT SERVICE — requires JWT
        # ============================================================

        location /api/v1/content/ {
            auth_request /_validate_jwt;

            proxy_pass http://content_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-ID $jwt_user_id;
            proxy_set_header X-User-Role $jwt_role;
        }

        # ============================================================
        # SUBMISSION SERVICE — requires JWT
        # ============================================================

        location /api/v1/submissions/ {
            auth_request /_validate_jwt;

            proxy_pass http://submission_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-ID $jwt_user_id;
            proxy_set_header X-User-Role $jwt_role;
        }

        # ============================================================
        # INTERNAL: JWT validation endpoint (used by auth_request)
        # ============================================================

        location = /_validate_jwt {
            internal;

            # If JWT is invalid, njs returns "0" and we deny access
            if ($jwt_payload = "0") {
                return 401;
            }

            # If JWT is valid, return 200 (auth_request passes)
            return 200;
        }


        # ============================================================
        # INTERNAL: Admin validation endpoint (used by auth_request)
        # Validates Basic Auth credentials against ADMIN_LOGIN/ADMIN_PASSWORD env vars
        # ============================================================

        location = /_validate_admin {
            internal;

            # If admin credentials are invalid, njs returns "0" and we deny access
            if ($admin_valid = "0") {
                return 401;
            }

            # If admin credentials are valid, return 200 (auth_request passes)
            return 200;
        }

        # ============================================================
        # ADMIN ROUTES — require Basic Auth with ADMIN_LOGIN/ADMIN_PASSWORD
        # Admin can: ban authors, hide/delete courses, add users to courses
        # ============================================================

        location /api/v1/admin/ {
            auth_request /_validate_admin;

            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Role 'ADMIN';
        }

        # ============================================================
        # HEALTH CHECK
        # ============================================================

        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ============================================================
        # DEFAULT — 404 for everything else
        # ============================================================

        location / {
            return 404;
        }
    }
}